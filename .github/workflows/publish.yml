name: Tistory Auto Publish

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST (00:00 UTC) 기준 — 이후 랜덤 딜레이로 09~10시 사이 발행
  workflow_dispatch:
    inputs:
      topic_id:
        description: '발행할 Topic ID (예: hb-013). 비워두면 다음 pending 토픽 자동 선택'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Random delay (09:00~10:00 KST 사이 랜덤 발행)
        if: github.event_name == 'schedule'
        run: |
          DELAY=$(( RANDOM % 3600 ))
          echo "Sleeping ${DELAY}s ($(( DELAY / 60 ))분 $(( DELAY % 60 ))초)"
          sleep "$DELAY"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Check pending topics
        id: check
        run: |
          COUNT=$(node scripts/pipeline.js list-topics 2>/dev/null | grep -c . || true)
          echo "pending_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Pending topics: $COUNT"

      - name: Restore auth.json
        if: steps.check.outputs.pending_count != '0' || inputs.topic_id != ''
        run: echo "$TISTORY_AUTH_JSON" > auth.json
        env:
          TISTORY_AUTH_JSON: ${{ secrets.TISTORY_AUTH_JSON }}

      - name: Publish article
        if: steps.check.outputs.pending_count != '0' || inputs.topic_id != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
          OPENAI_REASONING_EFFORT: ${{ vars.OPENAI_REASONING_EFFORT || 'medium' }}
          BLOG_THEME_NAME: ${{ vars.BLOG_THEME_NAME || '건강한 100세를 위해' }}
          TISTORY_BLOG_URL: ${{ secrets.TISTORY_BLOG_URL }}
          HEADLESS: 'true'
        run: |
          if [ -n "${{ inputs.topic_id }}" ]; then
            node scripts/pipeline.js publish --topic-id "${{ inputs.topic_id }}"
          else
            node scripts/pipeline.js publish
          fi

      - name: Commit updated topics.csv
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/tistory_300.csv
          if ! git diff --staged --quiet; then
            git commit -m "chore: mark topic as published [skip ci]"
            git push
          else
            echo "topics.csv unchanged, nothing to commit."
          fi
